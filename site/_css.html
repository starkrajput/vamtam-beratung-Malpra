<style id="digi-pages-css">
.digi-main{font-family:'Geologica',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#161616;font-weight:300;line-height:1.62}
.digi-main *{box-sizing:border-box}
.digi-wrap{width:100%;max-width:1200px;margin:0 auto;padding:0 28px}
.digi-hero{background:#f5f6f2;padding:120px 0 84px}
.digi-hero .eyebrow,.digi-eyebrow{display:inline-flex;align-items:center;gap:11px;font-size:.8rem;letter-spacing:.16em;text-transform:uppercase;color:#161616;margin-bottom:20px}
.digi-hero .eyebrow::before,.digi-eyebrow::before{content:"";width:28px;height:2px;background:#8FD299}
.digi-hero h1{font-size:clamp(2.6rem,5.4vw,4.4rem);font-weight:400;line-height:1.05;letter-spacing:-.02em;margin:0 0 20px;max-width:16ch}
.digi-hero p{font-size:1.15rem;max-width:60ch;margin:0;color:#5f635e}
.digi-crumbs{font-size:.85rem;color:#8a8f8a;margin-bottom:18px}
.digi-crumbs a:hover{color:#8FD299}
.digi-section{padding:96px 0}
.digi-section.alt{background:#f5f6f2}
.digi-section.dark{background:#161616;color:#fff}
.digi-section.mint{background:#8FD299}
.digi-head{max-width:760px;margin-bottom:52px}
.digi-head.center{margin:0 auto 52px;text-align:center}
.digi-head h2{font-size:clamp(2rem,4vw,3.2rem);font-weight:400;line-height:1.08;letter-spacing:-.02em;margin:0 0 14px}
.digi-head p{font-size:1.05rem;color:#5f635e;margin:0}
.digi-section.dark .digi-head p{color:#b9bdb9}
.digi-lead{font-size:1.2rem;line-height:1.7;color:#3b3f3b;max-width:70ch}
.digi-grid{display:grid;gap:26px}
.cols-2{grid-template-columns:repeat(2,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-4{grid-template-columns:repeat(4,1fr)}
.digi-card{background:#fff;border:1px solid #e7e8e2;border-radius:22px;padding:38px 32px;transition:.3s}
.digi-card:hover{transform:translateY(-6px);box-shadow:0 30px 60px -34px rgba(0,0,0,.22);border-color:#8FD299}
.digi-card .ic{width:58px;height:58px;border-radius:15px;background:#8FD299;display:grid;place-items:center;font-size:1.5rem;margin-bottom:22px}
.digi-card h3{font-size:1.3rem;font-weight:500;margin:0 0 10px}
.digi-card .num{font-size:.82rem;letter-spacing:.12em;color:#5aa869;margin-bottom:14px;font-weight:400}
.digi-card p{color:#5f635e;margin:0;font-size:.96rem}
.digi-split{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.digi-split img{width:100%;border-radius:28px;display:block}
.digi-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:30px}
.digi-stat .big{font-size:clamp(2.6rem,4.5vw,4rem);font-weight:500;color:#8FD299;line-height:1}
.digi-stat .lbl{font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:#5aa869;margin:10px 0 6px}
.digi-stat p{margin:0;color:#5f635e;font-size:.95rem}
.digi-list{list-style:none;margin:22px 0 0;padding:0}
.digi-list li{display:flex;gap:14px;padding:15px 0;border-top:1px solid #e7e8e2;font-size:1.02rem}
.digi-list li:last-child{border-bottom:1px solid #e7e8e2}
.digi-list .tk{color:#5aa869;font-weight:600}
.digi-btn{display:inline-flex;align-items:center;gap:10px;padding:15px 30px;border-radius:999px;background:#161616;color:#fff;font-size:.95rem;border:1px solid #161616;transition:.25s;cursor:pointer}
.digi-btn:hover{background:#8FD299;border-color:#8FD299;color:#161616;transform:translateY(-2px)}
.digi-btn.light{background:#fff;color:#161616;border-color:#fff}
.digi-btn.light:hover{background:#161616;color:#fff;border-color:#161616}
.digi-field{margin-bottom:16px}
.digi-field label{display:block;font-size:.85rem;margin-bottom:7px}
.digi-field input,.digi-field select,.digi-field textarea{width:100%;padding:14px 16px;border:1px solid #d7dad4;border-radius:12px;font-family:inherit;font-size:.95rem;background:#fff;font-weight:300}
.digi-field input:focus,.digi-field select:focus,.digi-field textarea:focus{outline:none;border-color:#8FD299}
.digi-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.digi-card-form{background:#fff;border:1px solid #e7e8e2;border-radius:28px;padding:40px}
.digi-post{border:1px solid #e7e8e2;border-radius:22px;overflow:hidden;background:#fff;transition:.3s;display:flex;flex-direction:column}
.digi-post:hover{transform:translateY(-6px);box-shadow:0 26px 54px -32px rgba(0,0,0,.22)}
.digi-post .thumb{aspect-ratio:16/10;overflow:hidden}
.digi-post .thumb img{width:100%;height:100%;object-fit:cover}
.digi-post .body{padding:24px 24px 28px}
.digi-post .tag{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#5aa869}
.digi-post h3{font-size:1.15rem;font-weight:400;margin:12px 0 8px}
.digi-post .date{font-size:.82rem;color:#8a8f8a}
@media(max-width:960px){.digi-split,.cols-2,.cols-3,.cols-4,.digi-stats,.digi-row{grid-template-columns:1fr}.digi-hero{padding:100px 0 64px}.digi-section{padding:70px 0}}
</style>
